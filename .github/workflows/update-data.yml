name: 每月自動更新長照資料

on:
  schedule:
    - cron: "0 20 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4
      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安裝套件
        run: pip install pandas numpy xlrd openpyxl pdfplumber
      - name: 下載最新原始資料
        run: python scripts/download_data.py
      - name: 解析長照 PDF
        run: python scripts/parse_ltc_pdfs.py
      - name: 重新產生縣市主表與預測
        run: python scripts/build_master.py
      - name: 提交更新（若有變動）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ assets/
          if git diff --staged --quiet; then
            echo "資料無變動，略過提交。"
          else
            git commit -m "自動更新長照資料 $(date +%Y-%m-%d)"
            git push
          fi
